name: Check Notebook Dependencies

on:
  push:
    paths:
      - '**.ipynb'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '**.ipynb'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: List installed packages
        run: uv pip list

      - name: Check notebook dependencies
        run: uv run python _SUPPORT/src/scripts/check_notebook_dependencies.py
