        compliance_location: "Downgradient monitoring points"

    # ========== GROUP 8: Atrazine - Garden Allotment Pesticide ==========
    - id: 8
      concession: "b010199"
      title: "Garden allotment pesticide contamination"
      contaminant: "Atrazine"
      description: >
        An atrazine spill from a garden allotment pesticide application. 

      properties:
        cas_number: "1912-24-9"
        molecular_weight_g_mol: 215.68
        solubility_mg_L: 35
        conservative: false

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 0.8e-9
        sorption: true
        distribution_coefficient_mL_g: 0.3  # Moderate sorption
        decay: false
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010199"
        injection_easting: 2680796.9      # m (LV95)
        injection_northing: 1248534.9     # m (LV95)
        extraction_easting: 2681005.5     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248318.8    # m (LV95)
        pumping_rate_m3_d: 5760           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.460     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. Scenario-realism retune: place the allotment
          # about 100 m from the well so the single pulse can arrive within the fixed 60 d
          # window while preserving the same Q, reactions, and grid settings.
          # Previous validated offset was ~278 m upgradient, lateral 233 m within the LARGE
          # capture y_max=Q/(2Ti)~417 m (Q=5760 m3/d, T~3000 m2/d, i~0.0023), but atrazine is
          # sorbing (Kd~0.3) and the source is a single 1-day pulse.
          # An intermediate ~150 m offset was also tested and rejected: it produced a peak
