        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 0.7e-9
        sorption: false                 # PFAS are highly mobile
        distribution_coefficient_mL_g: 0.0
        decay: false                    # Persistent
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010200"
        injection_easting: 2681455.9      # m (LV95)
        injection_northing: 1249228.9     # m (LV95)
        extraction_easting: 2681519.9     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1249158.9    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.142     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~73 m upgradient, lateral 66 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> inside capture.
          # Tested outcome: REACHES the well, ABOVE threshold (mobile, persistent).
          easting: 32.0              # m, +E offset from extraction well (upgradient)
          northing: -66.0            # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        # TODO: Adjust duration of source activation based on model runs to
        # ensure plume reaches monitoring point. Minimum 1 day.
        duration_days: 1               # 1-day spill
        concentration_mg_L: 1.0
        ssm_itype: -1

      simulation:
        # TODO: Adjust simulation duration based on model runs to ensure plume
        # reaches monitoring point. Minimum 30 days.
        duration_days: 30
        # TODO: Adjust output times to capture key transport dynamics
        output_times_days: [5, 15, 21, 31]

      submodel:
        # TODO: Adjust buffer size based on estimated plume travel distance
        # We accept smaller buffer zones to limit model size.
        buffer_north_m: 100
        buffer_south_m: 100
        buffer_east_m: 100
        buffer_west_m: 100
        # Do not edit the cell size
        cell_size_m: 2

      monitoring:
        threshold_mg_L: 0.0002          # Very low drinking water advisory (0.2 µg/L)
        compliance_location: "Drinking water wells"

    # ========== GROUP 6: PCE - Dry Cleaning Facility Leak ==========
    - id: 6
      concession: "b010224"
      title: "Dry cleaning facility solvent leak"
      contaminant: "Perchloroethylene (PCE)"
      description: >
        Point source PCE leak from urban dry cleaning facility with slight sorption.
