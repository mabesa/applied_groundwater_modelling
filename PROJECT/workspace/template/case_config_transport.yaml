      doublet:
        concession_id: "b010224"
        injection_easting: 2682617.0      # m (LV95)
        injection_northing: 1248326.3     # m (LV95)
        extraction_easting: 2682709.4     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248294.2    # m (LV95)
        pumping_rate_m3_d: 5760           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.596     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~250 m upgradient, lateral 244 m vs the LARGE
          # capture y_max=Q/(2Ti)~417 m (Q=5760 m3/d, T~3000 m2/d, i~0.0023) -> inside capture.
          # Q=5760 m3/d (the >3000 L/min class): wide capture zone draws the plume in.
          # Tested outcome: REACHES the well, ABOVE threshold.
          easting: 56.0              # m, +E offset from extraction well (upgradient)
          northing: -244.0           # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        duration_days: 90               # 3-month leak
        concentration_mg_L: 50.0
        ssm_itype: -1

      simulation:
        # Capped from 3650 d: the 90-d PCE pulse peaks at the well at ~344 d and
        # exceeds the 0.04 mg/L threshold over ~180-700 d, then clears (back to ~0
        # by ~1300 d). 1095 d (3 yr) captures the complete rise-peak-decline. The
        # original 3650-d horizon also FORCED the Courant cap at high Q=5760
        # (nstp=4000, Cr~1.25 > 1 -> numerically inaccurate); shortening to 1095 d
        # brings the required nstp back under the cap so Cr<1 (accurate).
        # Verdict unchanged (REACHES-above).
        duration_days: 1095
        output_times_days: [90, 180, 365, 548, 730, 1095]

      submodel:
        buffer_north_m: 500
        buffer_south_m: 500
        buffer_east_m: 500
        buffer_west_m: 500
        cell_size_m: 5

      monitoring:
        threshold_mg_L: 0.04            # Drinking water MCL
        compliance_location: "Property boundary"

    # ========== GROUP 7: Ammonium - Leaking Sewer Line ==========
    - id: 7
      concession: "b010230"
      title: "Leaking sewer line contamination"
      contaminant: "Ammonium (NH4+)"
      description: >
        Continuous ammonium discharge from aging urban sewer infrastructure with
        nitrification (decay). Model transformation and downgradient concentration profiles.

      properties:
        cas_number: "14798-03-9"
        molecular_weight_g_mol: 18.04
        solubility_mg_L: 1000000
        conservative: false

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 1.9e-9
        sorption: false
        distribution_coefficient_mL_g: 0.0
        decay: true
        first_order_decay_constant_1_per_day: 0.02  # Fast nitrification
        half_life_days: 34.7            # ~1 month half-life

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010230"
        injection_easting: 2682381.0      # m (LV95)
        injection_northing: 1248447.0     # m (LV95)
        extraction_easting: 2682480.0     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248406.0    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.093     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "line"                    # Line source (sewer)
        release_type: "continuous"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~136 m upgradient, lateral 114 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> just past nominal edge,
          # but the continuous line source still feeds the capture zone.
          # Tested outcome: REACHES the well, ABOVE threshold (despite nitrification decay).
          easting: 75.0              # m, +E offset from extraction well (upgradient)
          northing: -114.0           # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        duration_days: 3650             # Ongoing leak
        concentration_mg_L: 30.0
        ssm_itype: -1

      simulation:
        # Capped from 3650 d: this continuous source crosses the 0.5 mg/L threshold
        # at ~40 d and reaches a stable plateau (~2.35 mg/L -> REACHES-above, despite
        # nitrification decay) by ~330 d, flat thereafter. 730 d resolves the verdict
        # (early exceedance + stable 2-year plateau) and fits the budget easily.
        # Verdict unchanged (REACHES-above).
        duration_days: 730
        output_times_days: [30, 90, 180, 365, 548, 730]

      submodel:
        buffer_north_m: 400
        buffer_south_m: 400
        buffer_east_m: 400
        buffer_west_m: 400
        cell_size_m: 5

      monitoring:
