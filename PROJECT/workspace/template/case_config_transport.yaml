###############################################################
# Transport Case Study Configuration (All Groups)
###############################################################
# This file contains ALL transport scenarios for groups 0-8.
# Each group uses the scenario matching their group number.
# Keep units consistent (meters, days, m3/day, mg/L).
# Wells are REUSED from flow case study (case_config.yaml).
# The group number and authors are already defined in the case_config.yaml file.
# group:
#   number: 0                               
#   authors:                                
#     - "First Last"
#     - "Second Last"                      

# Fixed assignments by group number (each group gets ONE validated REAL
# geothermal-doublet concession; injection + extraction wells both active,
# extraction well = compliance/monitoring "Well"):
# Recirc fractions below are the CALIBRATED values (05f-calibrated K field).
# Group 0: concession b010205 - TCE       - Industrial spill (demo)   - Q=1370 m3/d, recirc 0.221
# Group 1: concession b010196 - Nitrate    - Sports field fertilizer  - Q=1370 m3/d, recirc 0.272
# Group 2: concession b010185 - Benzene    - Gas station leak (decay) - Q=1370 m3/d, recirc 0.384
# Group 3: concession b010211 - Chloride   - Legacy landfill          - Q=1370 m3/d, recirc 0.213
# Group 4: concession b010223 - Chromium   - Metal plating (R~19)     - Q=1370 m3/d, recirc 0.376
# Group 5: concession b010200 - PFOA       - Industrial point source  - Q=1370 m3/d, recirc 0.142
# Group 6: concession b010224 - PCE        - Dry cleaning (sorption)  - Q=5760 m3/d, recirc 0.596
# Group 7: concession b010230 - Ammonium   - Leaking sewer (decay)    - Q=1370 m3/d, recirc 0.093
# Group 8: concession b010199 - Atrazine   - Garden allotment         - Q=5760 m3/d, recirc 0.460
#
# Doublet locations are REAL, validated AWEL concessions. Groups 6 & 8 use the
# higher-rate (>3000 L/min) class (Q=5760 m3/d); all others Q=1370 m3/d.
# NOTE: the two SIGILL-failing concessions are intentionally NOT assigned here.
# NOTE: final coordinates STILL NEED JupyterHub-Linux re-validation before students use them.

title: "Contaminant transport with well field interactions"  # TODO: Tailor with your contaminant

description: >
  TODO: Provide 2–5 sentences describing your transport scenario. Include: contaminant type,
  source location/type, duration (pulse vs continuous), and the key question you're addressing
  regarding well-contaminant interactions (e.g., will pumping wells capture the plume? Does
  injection spread contamination? What's the breakthrough time at monitoring locations?).

# Parent flow model (the 05f-CALIBRATED MF6 / DISV steady-state field)
# MF6 GWT base: the transport base builds on the CALIBRATED steady-state
# MODFLOW 6 / DISV flow model produced by the flow track's 05f_calibration.ipynb
# (same DISV grid + wells as notebook4_model, but with the calibrated K field,
# mean K ~ 361 m/d). See _SUPPORT/src/transport_base_model.py, which calls
# model_io_utils.ensure_flow_model() to load the calibration simulation and gets
# model "limmat_valley". This REPLACES both the uncalibrated notebook4_model base
# and the legacy MODFLOW-NWT references (limmat_valley_model_nwt) that no longer apply.
model:
  data_name: flow_model_mf6               # Calibrated MF6 GWF model (05f); bootstrapped via ensure_flow_model()
  workspace: "~/applied_groundwater_modelling_data/limmat/calibration"  # 05f-calibrated model
  sim_namefile: "mfsim.nam"               # MF6 simulation name file
  sim_name: "limmat_valley"               # MF6 GWF model name inside the simulation
  baseline_model_name: "limmat_valley"

# Transport submodel output location
output:
  workspace: "~/applied_groundwater_modelling_data/limmat/transport/case_study_transport_group_"  # auto-expand with group number

# Wells from flow case study (REUSED, not reimplemented)
wells:
  source: "case_config"                   # Reuse wells from flow case study
  config_file: "./case_config.yaml"       # Path to flow case configuration
  notes: >
    Wells are loaded from the flow case study configuration. Students will identify
    which wells are pumping (extraction) vs injection wells/Sickergalerie based on
    flow rates, then analyze how these wells affect contaminant transport.

# Transport scenario assignments are FIXED by group number
transport_scenarios:
  options:
    # ========== GROUP 0: TCE - Industrial Spill (Demo) ==========
    - id: 0
      title: "Industrial solvent spill (TCE)"
      concession: "b010205"
      contaminant: "Trichloroethylene (TCE)"
      description: >
        A 1-day TCE spill from an industrial facility. Assess plume migration
        under natural gradient conditions and with well pumping/injection effects.
        Determine if/when contamination reaches the well (monitoring location).

      properties:
        # Chemical Abstracts Service (CAS) number and properties
        # Relevant to look up properties of a chemical in databases/literature,
        # find regulatory limits, toxicity, etc.
        cas_number: "79-01-6"
        molecular_weight_g_mol: 131.39
        solubility_mg_L: 1100
        conservative: true                # No sorption or decay

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 1.0e-9
        sorption: false
        distribution_coefficient_mL_g: 0.0
        decay: false
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010205"
        injection_easting: 2681745.9      # m (LV95)
        injection_northing: 1248144.8     # m (LV95)
        extraction_easting: 2681799.9     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248143.8    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.221     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~92 m upgradient, lateral 77 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> just inside capture.
          # Tested outcome: REACHES the well but stays BELOW threshold (dilution).
          easting: 51.0              # m, +E offset from extraction well (upgradient)
          northing: -77.0            # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        # TODO: Adjust duration of source activation based on model runs to 
        # ensure plume reaches monitoring point. Minimum 1 day.
        duration_days: 1               # 1-day spill
        concentration_mg_L: 100.0

      simulation:
        # TODO: Adjust simulation duration based on model runs to ensure plume
        # reaches monitoring point. Minimum 30 days. 
        duration_days: 60              # 60 days (manageable domain size)
        # TODO: Adjust output times to capture key transport dynamics
        output_times_days: [6, 11, 21, 61]

      submodel:
        # TODO: Adjust buffer size based on estimated plume travel distance
        # We accept smaller buffer zones to limit model size.
        buffer_north_m: 100
        buffer_south_m: 100
        buffer_east_m: 100
        buffer_west_m: 100
        # Do not edit the cell size
        cell_size_m: 2

      monitoring:
        threshold_mg_L: 0.005    # corrected 2026-07-19: was 5.0 (~1000x too high; TCE drinking-water standard ≈ 0.005 mg/L = 5 µg/L)
        compliance_location: "Well"

    # ========== GROUP 1: Nitrate - Sports Field Fertilizer ==========
    - id: 1
      concession: "b010196"
      title: "Sports field fertilizer contamination"
      contaminant: "Nitrate (NO3-)"
      description: >
        The tank holding the nitrate fertilizer for a large sports field has 
        leaked, unloading nitrate into the groundwater over a 1-day period. 
        Determine if the nitrate plume reaches the downgradient monitoring well 
        or the pumping well.

      properties:
        cas_number: "14797-55-8"
        molecular_weight_g_mol: 62.0
        solubility_mg_L: 850000
        conservative: true

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 1.9e-9
        sorption: false
        distribution_coefficient_mL_g: 0.0
        decay: false
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010196"
        injection_easting: 2681366.9      # m (LV95)
        injection_northing: 1248328.8     # m (LV95)
        extraction_easting: 2681365.9     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248266.8    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.272     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~179 m upgradient, lateral 169 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> well outside capture.
          # Tested outcome: does NOT reach the well (lateral bypass).
          easting: -60.0             # m, -E offset from extraction well (upgradient)
          northing: -169.0           # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        # TODO: Adjust duration of source activation based on model runs to 
        # ensure plume reaches monitoring point. Minimum 1 day.
        duration_days: 1             # 1-day spill
        concentration_mg_L: 50.0
        ssm_itype: -1

      simulation:
        # TODO: Adjust simulation duration based on model runs to ensure plume
        # reaches monitoring point. Minimum 30 days. 
        duration_days: 30
        # TODO: Adjust output times to capture key transport dynamics
        output_times_days: [2, 4, 6, 31]

      submodel:
        # TODO: Adjust buffer size based on estimated plume travel distance
        # We accept smaller buffer zones to limit model size.
        buffer_north_m: 100
        buffer_south_m: 100
        buffer_east_m: 100
        buffer_west_m: 100
        cell_size_m: 2

      monitoring:
        threshold_mg_L: 25.0            # Drinking water standard
        compliance_location: "Downgradient wells"

    # ========== GROUP 2: Benzene - Gas Station Leak ==========
    - id: 2
      concession: "b010185"
      title: "Gasoline station leak (BTEX)"
      contaminant: "Benzene"
      description: >
        Point source benzene leak with biodegradation. Assess natural attenuation
        capacity and monitored natural attenuation feasibility.

      properties:
        cas_number: "71-43-2"
        molecular_weight_g_mol: 78.11
        solubility_mg_L: 1780
        conservative: false

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 1.0e-9
        sorption: false
        distribution_coefficient_mL_g: 0.0
        decay: true
        first_order_decay_constant_1_per_day: 0.005  # Moderate biodegradation
        half_life_days: 138.6           # ~5 months half-life

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010185"
        injection_easting: 2681487.9      # m (LV95)
        injection_northing: 1249310.9     # m (LV95)
        extraction_easting: 2681515.9     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1249254.9    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.384     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~114 m upgradient, lateral 102 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> at capture edge.
          # Tested outcome: REACHES the well, ABOVE threshold.
          easting: 50.0              # m, +E offset from extraction well (upgradient)
          northing: -102.0           # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        # TODO: Adjust duration of source activation based on model runs to 
        # ensure plume reaches monitoring point. Minimum 1 day.
        duration_days: 10               # 2-month leak
        concentration_mg_L: 10.0
        ssm_itype: -1

      simulation:
        # TODO: Adjust simulation duration based on model runs to ensure plume
        # reaches monitoring point. Minimum 30 days. 
        duration_days: 60
        # TODO: Adjust output times to capture key transport dynamics
        output_times_days: [6, 11, 21, 31, 61]

      submodel:
        buffer_north_m: 100
        buffer_south_m: 100
        buffer_east_m: 100
        buffer_west_m: 100
        cell_size_m: 2

      monitoring:
        threshold_mg_L: 0.005           # Drinking water MCL
        compliance_location: "Downgradient monitoring wells"

    # ========== GROUP 3: Chloride - Legacy Landfill ==========
    - id: 3
      concession: "b010211"
      title: "Legacy landfill plume"
      contaminant: "Chloride (conservative tracer)"
      description: >
        Historical contamination from old landfill (10-year continuous source).
        Characterize current plume extent and predict future migration.

      properties:
        cas_number: "16887-00-6"
        molecular_weight_g_mol: 35.45
        solubility_mg_L: 350000
        conservative: true

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 2.0e-9
        sorption: false
        distribution_coefficient_mL_g: 0.0
        decay: false
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010211"
        injection_easting: 2682350.9      # m (LV95)
        injection_northing: 1248309.8     # m (LV95)
        extraction_easting: 2682394.3     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248252.2    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.213     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "area"
        release_type: "continuous"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~130 m upgradient, lateral 83 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> near capture edge.
          # Tested outcome: MARGINAL (borderline reaches the well).
          easting: 100.0             # m, +E offset from extraction well (upgradient)
          northing: -83.0            # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        duration_days: 3650             # Started 10 years ago, ongoing
        concentration_mg_L: 200.0
        ssm_itype: -1

      simulation:
        # Capped from 3650 d: this continuous source reaches a stable plateau
        # (~65 mg/L, BELOW the 100 mg/L threshold -> MARGINAL) by ~330 d and stays
        # flat thereafter, so 9/10 of the original horizon just recomputed a flat
        # line. 730 d shows the rise plus a full 2-year stable plateau and runs in
        # well under a minute on this Mac. Verdict unchanged (MARGINAL).
        duration_days: 730
        output_times_days: [90, 180, 365, 548, 730]

      submodel:
        buffer_north_m: 700
        buffer_south_m: 700
        buffer_east_m: 700
        buffer_west_m: 700
        cell_size_m: 5

      monitoring:
        threshold_mg_L: 100.0
        compliance_location: "Property boundary and river"

    # ========== GROUP 4: Chromium - Metal Plating Facility ==========
    - id: 4
      concession: "b010223"
      title: "Metal plating facility chromium leak"
      contaminant: "Chromium (Cr-VI)"
      description: >
        Point source chromium from electroplating workshop with sorption. Assess plume
        mobility and evaluate pump-and-treat remediation timing requirements.

      properties:
        cas_number: "18540-29-9"
        molecular_weight_g_mol: 52.0
        solubility_mg_L: 10000
        conservative: false

      transport:
        porosity: 0.20
        bulk_density_kg_m3: 1800.0
        longitudinal_dispersivity_m: 10.0
        transverse_dispersivity_m: 1.0
        vertical_dispersivity_m: 0.1
        molecular_diffusion_m2_s: 1.1e-9
        sorption: true
        distribution_coefficient_mL_g: 2.0  # Strong sorption
        decay: false
        first_order_decay_constant_1_per_day: 0.0
        half_life_days: null

      # --- Geothermal doublet (REAL validated AWEL concession; both wells active) ---
      # Extraction well = the compliance/monitoring "Well". Absolute Swiss LV95 (EPSG:2056).
      doublet:
        concession_id: "b010223"
        injection_easting: 2681890.0      # m (LV95)
        injection_northing: 1248203.9     # m (LV95)
        extraction_easting: 2681894.0     # m (LV95) - compliance/monitoring Well
        extraction_northing: 1248169.9    # m (LV95)
        pumping_rate_m3_d: 1370           # per-concession Q [m3/d]; both wells run at |Q|
        recirculation_fraction: 0.376     # validated injection->extraction recirc fraction (05f-calibrated field)
      source:
        type: "point"
        release_type: "pulse"
        location:
          # VALIDATED spill placement (scenario testing), as an easting/northing OFFSET
          # relative to the extraction well. ~93 m upgradient, lateral 76 m vs capture
          # y_max=Q/(2Ti)~99 m (Q=1370 m3/d, T~3000 m2/d, i~0.0023) -> inside capture geometry,
          # but Cr-VI is strongly retarded (R~19): the retarded front cannot cover the
          # distance over a short time budget. The exercise window is extended so
          # students can interpret the delayed, retarded breakthrough.
          easting: 53.0              # m, +E offset from extraction well (upgradient)
          northing: -76.0            # m, -N offset from extraction well (upgradient)
          layer: 1
        start_time_days: 0
        # TODO: Adjust duration of source activation based on model runs to
        # ensure plume reaches monitoring point. Minimum 1 day.
        duration_days: 1               # 1-day spill
        # Source concentration set to 13 mg/L so the delayed retarded front stays
        # clearly (not marginally) below the 0.1 mg/L threshold. Transport is linear
        # in source concentration (linear sorption, no decay), so peak ~ 0.079 mg/L
        # (~21% below threshold). The lesson is the RETARDATION-delayed arrival, not
        # a knife-edge threshold call. A 13 mg/L dissolved Cr-VI plume from a
        # plating spill is realistic/conservative.
        concentration_mg_L: 13.0
        ssm_itype: -1

      simulation:
        # TODO: Adjust simulation duration based on model runs to ensure plume
        # reaches monitoring point. Minimum 30 days.
        duration_days: 730
        # TODO: Adjust output times to capture key transport dynamics
        output_times_days: [90, 180, 365, 548, 730]

      submodel:
        # TODO: Adjust buffer size based on estimated plume travel distance
        # We accept smaller buffer zones to limit model size.
        buffer_north_m: 100
        buffer_south_m: 100
        buffer_east_m: 100
        buffer_west_m: 100
        # Do not edit the cell size
        cell_size_m: 2

      monitoring:
        threshold_mg_L: 0.1             # Drinking water standard
        compliance_location: "Property boundary and wells"

    # ========== GROUP 5: PFOA - Industrial Point Source ==========
